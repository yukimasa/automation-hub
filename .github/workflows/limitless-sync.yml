name: limitless-sync

on:
  schedule:
    - cron: "0 16 * * *"  # UTC 16:00 = JST 01:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - run: npx tsx scripts/limitless-sync.ts
        env:
          LIMITLESS_API_TOKEN: ${{ secrets.LIMITLESS_API_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LIMITLESS_RAW_DB_ID: ${{ secrets.LIMITLESS_RAW_DB_ID }}
          SYSTEM_LOGS_DB_ID: ${{ secrets.SYSTEM_LOGS_DB_ID }}
