name: data-integrity-check

on:
  schedule:
    - cron: "0 21 * * 0"  # UTC 日曜21:00 = JST 月曜06:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - run: npx tsx scripts/data-integrity-check.ts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LIMITLESS_RAW_DB_ID: ${{ secrets.LIMITLESS_RAW_DB_ID }}
          LIFELOG_DB_ID: ${{ secrets.LIFELOG_DB_ID }}
          SYSTEM_LOGS_DB_ID: ${{ secrets.SYSTEM_LOGS_DB_ID }}
